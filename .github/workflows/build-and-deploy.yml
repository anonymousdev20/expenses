name: Build and Deploy to Railway

# Trigger on every push to master.
# This workflow exists because the Flutter web build (Dart compilation)
# requires 4-8GB of RAM and consistently OOMs on Railway's build
# infrastructure. GitHub Actions runners provide ~7GB, which is sufficient.
# The strategy: build the Docker image here, push it to Railway's registry,
# then tell Railway to deploy the pre-built image — no compilation on Railway.
on:
  push:
    branches:
      - master

env:
  # Railway's container registry endpoint.
  REGISTRY: registry.railway.com

jobs:
  build-and-deploy:
    name: Build Docker image and deploy to Railway
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Free up disk space ──────────────────────────────────────────────
      # The Flutter/Dart toolchain and the canvaskit renderer are large.
      # Removing unused pre-installed software gives Docker more room to work.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      # ── 3. Set up Docker Buildx ────────────────────────────────────────────
      # Buildx gives us BuildKit, which provides better layer caching,
      # parallel stage execution, and more efficient memory use during build.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Authenticate with Railway's container registry ─────────────────
      # Railway uses token-based auth for its registry.
      # RAILWAY_TOKEN must be added as a GitHub Actions secret:
      #   Repository → Settings → Secrets and variables → Actions → New secret
      #   Name: RAILWAY_TOKEN   Value: <your Railway API token>
      - name: Log in to Railway container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Railway registry uses the literal string "railway" as the username;
          # the API token is the password.
          username: railway
          password: ${{ secrets.RAILWAY_TOKEN }}

      # ── 5. Derive image metadata ───────────────────────────────────────────
      # Tag the image with both the short commit SHA (for traceability) and
      # "latest" (so Railway always has a stable tag to reference).
      # The image name follows Railway's registry convention:
      #   registry.railway.com/<project-id>/<service-id>:<tag>
      #
      # Required GitHub secrets (add alongside RAILWAY_TOKEN):
      #   RAILWAY_PROJECT_ID  – found in Railway dashboard → project settings
      #   RAILWAY_SERVICE_ID  – found in Railway dashboard → service settings
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.RAILWAY_PROJECT_ID }}/${{ secrets.RAILWAY_SERVICE_ID }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # ── 6. Build and push the Docker image ────────────────────────────────
      # This is the step that would OOM on Railway. The GitHub Actions runner
      # has ~7GB of RAM, which comfortably covers the 4-8GB Dart compilation
      # needs. BuildKit's --memory flag is not set here because the runner's
      # full memory budget is available by default.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs using the GitHub Actions cache backend.
          # This dramatically speeds up subsequent builds when only source
          # files change (the Flutter SDK layer is reused from cache).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Deploy the pre-built image to Railway ──────────────────────────
      # Now that the image is in Railway's registry, we trigger a deployment
      # via the Railway API. Railway will pull and run the image directly —
      # no build step, no compilation, no OOM risk.
      - name: Deploy image to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          # The short SHA tag produced by docker/metadata-action (e.g. "a1b2c3d").
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
        run: |
          # Construct the full image reference that was just pushed.
          IMAGE_REF="${REGISTRY}/${RAILWAY_PROJECT_ID}/${RAILWAY_SERVICE_ID}:${IMAGE_TAG:0:7}"

          echo "Deploying image: ${IMAGE_REF}"

          # Call the Railway REST API to create a new deployment from the image.
          # Docs: https://docs.railway.com/reference/public-api
          HTTP_STATUS=$(curl --silent --output /tmp/railway_response.json \
            --write-out "%{http_code}" \
            --request POST \
            --url "https://backboard.railway.com/graphql/v2" \
            --header "Authorization: Bearer ${RAILWAY_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"query\": \"mutation deployImage(\$serviceId: String!, \$projectId: String!, \$image: String!) { serviceInstanceDeploy(serviceId: \$serviceId, projectId: \$projectId, image: \$image) }\",
              \"variables\": {
                \"serviceId\": \"${RAILWAY_SERVICE_ID}\",
                \"projectId\": \"${RAILWAY_PROJECT_ID}\",
                \"image\": \"${IMAGE_REF}\"
              }
            }")

          echo "Railway API response (HTTP ${HTTP_STATUS}):"
          cat /tmp/railway_response.json

          # Fail the workflow step if the API returned a non-2xx status.
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "ERROR: Railway API returned HTTP ${HTTP_STATUS}"
            exit 1
          fi

          # Also fail if the GraphQL response contains errors.
          if grep -q '"errors"' /tmp/railway_response.json; then
            echo "ERROR: Railway API returned GraphQL errors (see response above)"
            exit 1
          fi

          echo "Deployment triggered successfully."
