<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" 
        fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Wallet icon -->
  <g transform="translate(256, 256)">
    <!-- Main wallet shape -->
    <path d="M -80 -40 L 80 -40 Q 90 -40 90 -30 L 90 30 Q 90 40 80 40 L -80 40 Q -90 40 -90 30 L -90 -30 Q -90 -40 -80 -40 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Wallet fold -->
    <path d="M -80 -40 L -60 -60 L 60 -60 L 80 -40 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- Dollar sign -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="48" 
          font-weight="bold" text-anchor="middle" fill="#6366f1">$</text>
    
    <!-- Card lines -->
    <rect x="-70" y="-20" width="60" height="3" rx="1" fill="#6366f1" opacity="0.3"/>
    <rect x="-70" y="-10" width="40" height="3" rx="1" fill="#6366f1" opacity="0.3"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="4" fill="white" opacity="0.6"/>
  <circle cx="412" cy="100" r="4" fill="white" opacity="0.6"/>
  <circle cx="100" cy="412" r="4" fill="white" opacity="0.6"/>
  <circle cx="412" cy="412" r="4" fill="white" opacity="0.6"/>
</svg>
