[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python server.py"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "expense-tracker-pwa"

[services.web]
name = "expense-tracker-pwa"

[[services.web.routes]]
path = "/"
port = 8080

[[services.web.routes]]
path = "/app"
port = 8080

[[services.web.routes]]
path = "/*"
port = 8080
