[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build]
# Builder is set to IMAGE so Railway deploys the pre-built Docker image pushed
# by the GitHub Actions workflow instead of rebuilding from source. This avoids
# the OOM crash that occurs when Dart compiles the Flutter web app on Railway's
# build infrastructure. See .github/workflows/build-and-deploy.yml.
builder = "IMAGE"
